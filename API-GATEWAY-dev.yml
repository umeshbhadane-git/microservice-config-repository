spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: lb://USER-CLIENT
              predicates:
                - Path=/users/**

            - id: hotel-service
              uri: lb://HOTEL-CLIENT
              predicates:
                - Path=/hotels/**

            - id: rating-service
              uri: lb://RATING-CLIENT
              predicates:
                - Path=/ratings/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/